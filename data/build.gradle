// most of the code here is copied from the following guide:
// https://spring.io/guides/gs/multi-module

plugins {
    id 'buildlogic.java-library-conventions'
    // the plugin adds the spring boot framework
    id 'org.springframework.boot' version '3.4.1' apply false
    id 'io.spring.dependency-management' version '1.1.7'
}


repositories {
    mavenCentral()
}

dependencyManagement {
    imports {
        mavenBom org.springframework.boot.gradle.plugin.SpringBootPlugin.BOM_COORDINATES
    }
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter'

    // for jackson validation
    implementation group: 'org.springframework.boot', name: 'spring-boot-starter-validation', version: '3.4.0'

    // used for mongodb as a database
//    implementation 'org.springframework.boot:spring-boot-starter-data-mongodb'
}


tasks.withType(JavaCompile).configureEach {
    options.compilerArgs.add("-parameters")
}
